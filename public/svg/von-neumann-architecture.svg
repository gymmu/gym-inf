<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  width="900"
  height="500"
  viewBox="0 0 900 500"
  xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
    <style>
      .box { fill: #2C6CC4; stroke: #ffffff; stroke-width: 2; rx: 8; ry: 8; }
      .bus { fill: #E69F55; stroke: #ffffff; stroke-width: 2; rx: 10; ry: 10; }
      .label { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .ram-text { font-size: 14px; font-weight: bold; fill: #ffffff; }
      .bus-label { font-size: 18px; font-weight: bold; fill: #000000; }
      .arrow { stroke: #ffffff; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
  </defs>
  
  <rect x="0" y="0" width="900" height="500" fill="#333333"/>
  
  <text x="450" y="30" class="label" style="font-size: 24px; font-weight: bold;">Von Neumann Architektur</text>
  
  <rect x="50" y="165" width="120" height="80" class="box"/>
  <text x="110" y="205" class="label">CPU</text>
  
  <rect x="730" y="165" width="120" height="80" class="box"/>
  <text x="790" y="205" class="label">RAM</text>
  <text x="790" y="225" class="ram-text">RAM</text>
  
  <rect x="390" y="165" width="120" height="80" class="bus"/>
  <text x="450" y="205" class="bus-label">BUS</text>
  
  <rect x="50" y="30" width="120" height="80" class="box"/>
  <text x="110" y="70" class="label">Tastatur</text>
  
  <rect x="730" y="30" width="120" height="80" class="box"/>
  <text x="790" y="70" class="label">Bildschirm</text>
  
  <line x1="170" y1="205" x2="390" y2="205" class="arrow"/>
  <line x1="510" y1="205" x2="730" y2="205" class="arrow"/>
  
  <line x1="110" y1="110" x2="450" y2="165" class="arrow"/>
  <line x1="450" y1="165" x2="790" y2="110" class="arrow"/>
  
</svg>
