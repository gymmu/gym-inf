events {
    worker_connections 1024;
}

http {
    upstream gym_inf_server {
        server server:3000;
    }

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # API proxy - CORS is handled by Express
        location /api/ {
            proxy_pass http://gym_inf_server;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cookie support for sessions
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://gym_inf_server/api/health;
            access_log off;
        }

        # Root status page
        location / {
            return 200 '{"status":"ok","message":"Gym-Inf API Gateway (Development)"}';
            add_header Content-Type application/json;
        }
    }
}
