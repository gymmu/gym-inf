events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    upstream gym_inf_server {
        server server:3000;
    }

    upstream gym_inf_client {
        server client:80;
    }

    # HTTP -> HTTPS redirect + Certbot challenge
    server {
        listen 80;
        server_name DOMAIN_PLACEHOLDER;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name DOMAIN_PLACEHOLDER;

        # SSL certificates (managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # API proxy - must come before the client catch-all
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://gym_inf_server;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Stricter rate limiting for auth endpoints
        location ~ ^/api/auth/(login|register|forgot-password) {
            limit_req zone=auth_limit burst=3 nodelay;

            proxy_pass http://gym_inf_server;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        # Health check (no logging)
        location /health {
            proxy_pass http://gym_inf_server/api/health;
            access_log off;
        }

        # Prisma Studio (admin only - protect with HTTP auth or IP whitelist)
        # Only works when prisma-studio container is running
        location /prisma-studio/ {
            # Optional: Basic auth (uncomment to enable)
            # auth_basic "Prisma Studio Access";
            # auth_basic_user_file /etc/nginx/.htpasswd;

            # Direct proxy to prisma-studio container (no upstream needed)
            proxy_pass http://prisma-studio:5555/;
            proxy_http_version 1.1;
            
            # WebSocket support for Prisma Studio
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 86400;
            
            # Return 503 if prisma-studio container is not running
            error_page 502 503 504 = @prisma_studio_unavailable;
        }
        
        location @prisma_studio_unavailable {
            return 503 '{"error": "Prisma Studio is not running. Start it with: ./scripts/prisma-studio.sh start"}';
            add_header Content-Type application/json;
        }

        # Client - everything else goes to the React app
        location / {
            proxy_pass http://gym_inf_client;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
